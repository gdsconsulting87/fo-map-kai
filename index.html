<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peta FO PT Telkom – Jalur KAI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* LOADING */
#loading {
  position: fixed; inset: 0; background: #1a2744;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999; color: white;
}
#loading h2 { font-size: 18px; margin-bottom: 12px; }
#loading p  { font-size: 13px; color: #94a3b8; margin-top: 8px; }
.spinner {
  width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* HEADER */
#header {
  background: #1a2744; color: white;
  padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  flex-shrink: 0; z-index: 1100;
}
#header h1 { font-size: 15px; font-weight: 600; flex: 1; min-width: 180px; }
#search-box {
  padding: 6px 10px; border: none; border-radius: 6px;
  font-size: 13px; width: 200px; outline: none;
}
#count-badge {
  background: #3b82f6; color: white; padding: 4px 10px;
  border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap;
}
#refresh-btn {
  background: #10b981; color: white; border: none; border-radius: 6px;
  padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
  white-space: nowrap;
}
#refresh-btn:hover { background: #059669; }

/* CONTROLS */
#controls {
  background: #f1f5f9; padding: 6px 16px;
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  border-bottom: 1px solid #e2e8f0; flex-shrink: 0;
}
.ctrl-label { font-size: 11px; color: #64748b; font-weight: 700; white-space: nowrap; }
.ctrl-sep { width: 1px; background: #cbd5e1; height: 20px; margin: 0 4px; }
.type-btn {
  padding: 4px 12px; border-radius: 20px; border: 2px solid;
  font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.type-btn.active { color: white; }
.type-btn.inactive { background: white !important; opacity: 0.5; }
#type-crossing { border-color: #1a2744; background: #1a2744; color: white; }
#type-sejajar  { border-color: #0891b2; background: #0891b2; color: white; }
.filter-btn {
  padding: 3px 9px; border-radius: 20px; border: 2px solid;
  font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
.filter-btn.active { color: white; }
.filter-btn.inactive { background: white !important; opacity: 0.45; }
#btn-all {
  background: #334155; color: white; border: none; border-radius: 20px;
  padding: 4px 12px; font-size: 11px; font-weight: 700; cursor: pointer;
}

/* LEGEND */
#legend-strip {
  display: flex; align-items: center; gap: 16px;
  background: #fff; padding: 4px 16px;
  border-bottom: 1px solid #e2e8f0; font-size: 11px; color: #334155;
  flex-wrap: wrap; flex-shrink: 0;
}
.leg-item { display: flex; align-items: center; gap: 6px; }

/* MAIN */
#main { display: flex; flex: 1; overflow: hidden; position: relative; }

/* SIDEBAR */
#sidebar {
  width: 300px; min-width: 300px;
  background: #fff; border-right: 1px solid #e2e8f0;
  display: flex; flex-direction: column;
  transform: translateX(-300px);
  transition: transform 0.3s ease;
  position: absolute; left: 0; top: 0; bottom: 0;
  z-index: 1000; box-shadow: 2px 0 12px rgba(0,0,0,.15);
}
#sidebar.open { transform: translateX(0); }
#sidebar-header {
  background: #1a2744; color: white;
  padding: 12px 14px; display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#sidebar-header span { font-weight: 700; font-size: 14px; }
#sidebar-close {
  background: none; border: none; color: white;
  font-size: 20px; cursor: pointer; line-height: 1;
}
#daop-select-wrap { padding: 10px 14px; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
#daop-select {
  width: 100%; padding: 7px 10px; border: 1.5px solid #cbd5e1;
  border-radius: 6px; font-size: 13px; color: #1e293b;
  background: #f8fafc; cursor: pointer; outline: none;
}
#sidebar-list { flex: 1; overflow-y: auto; }
.list-section-header {
  padding: 8px 14px 6px; font-size: 11px; font-weight: 700; color: white;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 10;
}
.data-row {
  padding: 8px 14px; border-bottom: 1px solid #f1f5f9;
  cursor: pointer; transition: background 0.15s;
  display: flex; align-items: flex-start; gap: 10px;
}
.data-row:hover { background: #f0f9ff; }
.row-info { flex: 1; min-width: 0; }
.row-noid { font-weight: 700; font-size: 12px; color: #1e293b; }
.row-stasiun { font-size: 11px; color: #475569; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-coord { font-size: 10px; color: #94a3b8; margin-top: 1px; font-family: monospace; }
.empty-msg { padding: 24px 14px; text-align: center; color: #94a3b8; font-size: 12px; }

/* TOGGLE BTN */
#sidebar-toggle {
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  z-index: 1001; background: #1a2744; color: white;
  border: none; border-radius: 0 8px 8px 0;
  width: 28px; height: 56px; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 2px 0 8px rgba(0,0,0,.2); transition: left 0.3s ease;
}
#sidebar-toggle.open { left: 300px; }

#map { flex: 1; }

/* POPUP */
.custom-popup .leaflet-popup-content-wrapper {
  border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.15); padding: 0; min-width: 260px;
}
.custom-popup .leaflet-popup-content { margin: 0; }
.popup-header {
  padding: 10px 14px 8px; color: white;
  border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.popup-body { padding: 10px 14px 12px; font-size: 12px; }
.popup-row { display: flex; margin-bottom: 4px; }
.popup-label { color: #64748b; width: 95px; flex-shrink: 0; font-size: 11px; }
.popup-value { font-weight: 600; color: #1e293b; }
.popup-badge {
  padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700;
  color: white; margin-left: auto; background: rgba(0,0,0,0.25);
}
.gmaps-btn {
  display: inline-block; margin-top: 8px; padding: 5px 12px;
  background: #10b981; color: white; text-decoration: none;
  border-radius: 5px; font-size: 11px; font-weight: 600;
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>Memuat data peta...</h2>
  <p>Mengambil data dari Google Sheets</p>
</div>

<div id="header">
  <h1>🛰️ Peta Fiber Optik PT Telkom – Jalur KAI</h1>
  <input id="search-box" type="text" placeholder="Cari NO ID / Stasiun / STO..." oninput="doSearch(this.value)">
  <button id="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
  <div id="count-badge">Memuat...</div>
</div>

<div id="controls">
  <span class="ctrl-label">Tipe:</span>
  <button class="type-btn active" id="type-crossing" onclick="toggleType('crossing')">⊕ Crossing</button>
  <button class="type-btn active" id="type-sejajar"  onclick="toggleType('sejajar')">◆ Sejajar</button>
  <div class="ctrl-sep"></div>
  <span class="ctrl-label">Wilayah:</span>
  <button id="btn-all" onclick="toggleAll()">Semua ON</button>
  <div id="filter-btns"></div>
</div>

<div id="legend-strip">
  <span style="font-weight:700;color:#475569">Legenda:</span>
  <span class="leg-item">
    <svg width="20" height="28" viewBox="0 0 24 36">
      <path d="M12 0C5.4 0 0 5.4 0 12c0 8.4 12 24 12 24S24 20.4 24 12C24 5.4 18.6 0 12 0z" fill="#475569" stroke="white" stroke-width="1.8"/>
      <line x1="12" y1="6.5" x2="12" y2="17.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="6.5" y1="12" x2="17.5" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    Crossing
  </span>
  <span class="leg-item">
    <svg width="56" height="18" viewBox="0 0 56 18">
      <line x1="0" y1="9" x2="56" y2="9" stroke="#475569" stroke-width="3" stroke-dasharray="6,4"/>
      <polygon points="28,2 35,9 28,16 21,9" fill="#475569" stroke="white" stroke-width="1.5"/>
      <circle cx="3"  cy="9" r="3" fill="#475569" stroke="white" stroke-width="1.2"/>
      <circle cx="53" cy="9" r="3" fill="#475569" stroke="white" stroke-width="1.2"/>
    </svg>
    Sejajar
  </span>
  <span style="color:#94a3b8;font-size:10px">Warna = wilayah DAOP/DIVRE &nbsp;|&nbsp; Data live dari Google Sheets</span>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-header">
      <span>📋 Daftar Data</span>
      <button id="sidebar-close" onclick="closeSidebar()">✕</button>
    </div>
    <div id="daop-select-wrap">
      <select id="daop-select" onchange="renderList(this.value)">
        <option value="">— Pilih DAOP / DIVRE —</option>
      </select>
    </div>
    <div id="sidebar-list">
      <div class="empty-msg">Pilih DAOP/DIVRE di atas<br>untuk melihat daftar data</div>
    </div>
  </div>
  <button id="sidebar-toggle" onclick="toggleSidebar()" title="Buka/tutup daftar">☰</button>
  <div id="map"></div>
</div>

<script>
// ── CONFIG ──
const SHEET_ID  = '1A6B3no8ZFgs1VdtUB3ghOILJ4yLVJoVUwIm0svfrtBM';
const API_KEY   = 'AIzaSyCyt_zKW_Eg_hCjunKd4C3nwDMGoWNqltA';
const SHEET_C   = 'crossing';
const SHEET_S   = 'sejajar';

const COLORS = {
  'DAOP 1':'#2563eb','DAOP 2':'#16a34a','DAOP 3':'#ea580c',
  'DAOP 4':'#dc2626','DAOP 5':'#7c3aed','DAOP 6':'#ca8a04',
  'DAOP 7':'#db2777','DAOP 8':'#92400e','DAOP 9':'#0891b2',
  'DIVRE I':'#475569','DIVRE III':'#15803d','DIVRE IV':'#9f1239',
};
function getColor(w) { return COLORS[w] || '#888'; }

// ── MAP ──
const map = L.map('map').setView([-2.5, 113.0], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

let CROSSING_DATA = [], SEJAJAR_DATA = [];
let crossingClusters = {}, crossingItems = {};
let sejajarGroups = {}, sejajarItems = {};
let activeWilayah = {}, showCrossing = true, showSejajar = true;
let wilayahList = [];

// ── FETCH FROM SHEETS ──
async function fetchSheet(sheetName) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${sheetName}!A1:Z9999?key=${API_KEY}`;
  const res  = await fetch(url);
  const json = await res.json();
  if (!json.values || json.values.length < 2) return [];
  const [headers, ...rows] = json.values;
  return rows.map(row => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = row[i] || '');
    return obj;
  });
}

async function loadData() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('count-badge').textContent = 'Memuat...';
  try {
    // Clear existing layers
    wilayahList.forEach(w => {
      if (crossingClusters[w]) map.removeLayer(crossingClusters[w]);
      if (sejajarGroups[w])    map.removeLayer(sejajarGroups[w]);
    });
    crossingClusters = {}; crossingItems = {};
    sejajarGroups = {};    sejajarItems = {};
    activeWilayah = {};    wilayahList = [];
    document.getElementById('filter-btns').innerHTML = '';
    document.getElementById('daop-select').innerHTML = '<option value="">— Pilih DAOP / DIVRE —</option>';

    // Fetch
    const [cRaw, sRaw] = await Promise.all([fetchSheet(SHEET_C), fetchSheet(SHEET_S)]);

    CROSSING_DATA = cRaw.map(d => ({
      ...d, lat: parseFloat(d.lat), lon: parseFloat(d.lon)
    })).filter(d => !isNaN(d.lat) && !isNaN(d.lon));

    SEJAJAR_DATA = sRaw.map(d => ({
      ...d,
      lat1: parseFloat(d.lat1), lon1: parseFloat(d.lon1),
      lat2: parseFloat(d.lat2), lon2: parseFloat(d.lon2)
    })).filter(d => !isNaN(d.lat1) && !isNaN(d.lat2));

    // Wilayah list
    wilayahList = [...new Set([
      ...CROSSING_DATA.map(d => d.wilayah),
      ...SEJAJAR_DATA.map(d => d.wilayah)
    ])].sort();
    wilayahList.forEach(w => activeWilayah[w] = true);

    buildLayers();
    buildFilterBtns();
    buildDaopSelect();
    updateCount();
    document.getElementById('loading').style.display = 'none';
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="text-align:center;padding:20px">
        <p style="color:#f87171;font-size:14px;margin-bottom:8px">⚠️ Gagal memuat data</p>
        <p style="color:#94a3b8;font-size:12px">${e.message}</p>
        <button onclick="loadData()" style="margin-top:16px;padding:8px 20px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px">Coba Lagi</button>
      </div>`;
  }
}

// ── ICONS ──
function makeCrossingIcon(color) {
  return L.divIcon({
    html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 36" width="20" height="30">
      <path d="M12 0C5.4 0 0 5.4 0 12c0 8.4 12 24 12 24S24 20.4 24 12C24 5.4 18.6 0 12 0z" fill="${color}" stroke="white" stroke-width="1.8"/>
      <line x1="12" y1="6.5" x2="12" y2="17.5" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="6.5" y1="12" x2="17.5" y2="12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    </svg>`,
    className:'', iconSize:[20,30], iconAnchor:[10,30], popupAnchor:[0,-30]
  });
}
function makeSejajarIcon(color) {
  return L.divIcon({
    html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22">
      <polygon points="12,1 23,12 12,23 1,12" fill="${color}" stroke="white" stroke-width="2"/>
      <line x1="12" y1="7" x2="12" y2="17" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="7"  y1="12" x2="17" y2="12" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    </svg>`,
    className:'', iconSize:[22,22], iconAnchor:[11,11], popupAnchor:[0,-14]
  });
}

// ── POPUP ──
function buildPopup(d, tipe) {
  const color = getColor(d.wilayah);
  const gmaps = tipe==='crossing'
    ? `https://www.google.com/maps?q=${d.lat},${d.lon}`
    : `https://www.google.com/maps/dir/${d.lat1},${d.lon1}/${d.lat2},${d.lon2}`;
  const coordRow = tipe==='crossing'
    ? `<div class="popup-row"><span class="popup-label">Koordinat</span><span class="popup-value">${d.lat}, ${d.lon}</span></div>`
    : `<div class="popup-row"><span class="popup-label">Koord. Awal</span><span class="popup-value">${d.lat1}, ${d.lon1}</span></div>
       <div class="popup-row"><span class="popup-label">Koord. Akhir</span><span class="popup-value">${d.lat2}, ${d.lon2}</span></div>`;
  return `<div>
    <div class="popup-header" style="background:${color}">
      <span>NO ${d.no} – ID ${d.no_id} | ${d.wilayah}</span>
      <span class="popup-badge">${tipe==='crossing'?'⊕ CROSSING':'◆ SEJAJAR'}</span>
    </div>
    <div class="popup-body">
      <div class="popup-row"><span class="popup-label">KM+HM</span><span class="popup-value">${d.km}</span></div>
      <div class="popup-row"><span class="popup-label">Stasiun-Antara</span><span class="popup-value">${d.stasiun}</span></div>
      <div class="popup-row"><span class="popup-label">Lintas</span><span class="popup-value">${d.lintas}</span></div>
      <div class="popup-row"><span class="popup-label">STO</span><span class="popup-value">${d.sto}</span></div>
      <div class="popup-row"><span class="popup-label">Area / Reg</span><span class="popup-value">${d.area} ${d.reg}</span></div>
      <div class="popup-row"><span class="popup-label">Branch</span><span class="popup-value">${d.branch}</span></div>
      ${coordRow}
      <a class="gmaps-btn" href="${gmaps}" target="_blank">📍 Buka di Google Maps</a>
    </div>
  </div>`;
}

// ── BUILD LAYERS ──
function buildLayers() {
  wilayahList.forEach(w => {
    crossingClusters[w] = L.markerClusterGroup({
      maxClusterRadius: 40,
      iconCreateFunction: cluster => L.divIcon({
        html: `<div style="background:${getColor(w)};color:white;border-radius:50%;width:34px;height:34px;
                     display:flex;align-items:center;justify-content:center;font-weight:700;
                     font-size:11px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3)">
                 ${cluster.getChildCount()}</div>`,
        className:'', iconSize:[34,34], iconAnchor:[17,17]
      })
    });
    crossingItems[w] = [];
    sejajarGroups[w] = L.layerGroup();
    sejajarItems[w]  = [];
  });

  CROSSING_DATA.forEach((d, i) => {
    const marker = L.marker([d.lat, d.lon], { icon: makeCrossingIcon(getColor(d.wilayah)) });
    marker.bindPopup(buildPopup(d,'crossing'), { className:'custom-popup', maxWidth:320 });
    marker._cIdx = i;
    crossingClusters[d.wilayah].addLayer(marker);
    crossingItems[d.wilayah].push(marker);
  });

  SEJAJAR_DATA.forEach((d, i) => {
    const color = getColor(d.wilayah);
    const popup = buildPopup(d,'sejajar');
    const pOpts = { className:'custom-popup', maxWidth:320 };
    const midLat = (d.lat1+d.lat2)/2, midLon = (d.lon1+d.lon2)/2;
    const line = L.polyline([[d.lat1,d.lon1],[d.lat2,d.lon2]],
      { color, weight:3, opacity:0.85, dashArray:'7,5' }).bindPopup(popup, pOpts);
    const mid = L.marker([midLat,midLon], { icon:makeSejajarIcon(color), zIndexOffset:100 })
      .bindPopup(popup, pOpts);
    mid._sIdx = i;
    const cOpts = { radius:5, color:'white', weight:2, fillColor:color, fillOpacity:1 };
    sejajarGroups[d.wilayah].addLayer(line);
    sejajarGroups[d.wilayah].addLayer(mid);
    sejajarGroups[d.wilayah].addLayer(L.circleMarker([d.lat1,d.lon1], cOpts).bindPopup(popup, pOpts));
    sejajarGroups[d.wilayah].addLayer(L.circleMarker([d.lat2,d.lon2], cOpts).bindPopup(popup, pOpts));
    sejajarItems[d.wilayah].push({ line, mid });
  });

  wilayahList.forEach(w => {
    crossingClusters[w].addTo(map);
    sejajarGroups[w].addTo(map);
  });
}

// ── FILTER BUTTONS ──
function buildFilterBtns() {
  const div = document.getElementById('filter-btns');
  wilayahList.forEach(w => {
    const color  = getColor(w);
    const cCount = (crossingItems[w]||[]).length;
    const sCount = (sejajarItems[w]||[]).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn active';
    btn.id = 'fb-'+w.replace(/ /g,'_');
    btn.style.cssText = `border-color:${color};background:${color};color:white`;
    btn.textContent = `${w} (${cCount}/${sCount})`;
    btn.title = `Crossing: ${cCount} · Sejajar: ${sCount}`;
    btn.onclick = () => toggleWilayah(w);
    div.appendChild(btn);
  });
}

// ── DAOP SELECT ──
function buildDaopSelect() {
  const sel = document.getElementById('daop-select');
  wilayahList.forEach(w => {
    const opt = document.createElement('option');
    opt.value = w; opt.textContent = w;
    sel.appendChild(opt);
  });
}

// ── SIDEBAR LIST ──
function renderList(w) {
  const listDiv = document.getElementById('sidebar-list');
  if (!w) { listDiv.innerHTML='<div class="empty-msg">Pilih DAOP/DIVRE di atas<br>untuk melihat daftar data</div>'; return; }
  const color  = getColor(w);
  const cData  = CROSSING_DATA.map((d,i)=>({...d,_i:i})).filter(d=>d.wilayah===w);
  const sData  = SEJAJAR_DATA.map((d,i)=>({...d,_i:i})).filter(d=>d.wilayah===w);
  let html = '';

  html += `<div class="list-section-header" style="background:${color}" onclick="toggleSection('sec-c-${w.replace(/ /g,'_')}','arr-c-${w.replace(/ /g,'_')}')">
    <span>⊕ Crossing (${cData.length})</span><span id="arr-c-${w.replace(/ /g,'_')}">▼</span>
  </div><div id="sec-c-${w.replace(/ /g,'_')}">`;
  if (!cData.length) html += `<div class="empty-msg">Tidak ada data crossing</div>`;
  cData.forEach(d => {
    html += `<div class="data-row" onclick="flyToCrossing(${d._i})">
      <div class="row-info">
        <div class="row-noid">ID ${d.no_id} · NO ${d.no}</div>
        <div class="row-stasiun">${d.stasiun}</div>
        <div class="row-coord">${d.lat}, ${d.lon}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  html += `<div class="list-section-header" style="background:${color}cc" onclick="toggleSection('sec-s-${w.replace(/ /g,'_')}','arr-s-${w.replace(/ /g,'_')}')">
    <span>◆ Sejajar (${sData.length})</span><span id="arr-s-${w.replace(/ /g,'_')}">▼</span>
  </div><div id="sec-s-${w.replace(/ /g,'_')}">`;
  if (!sData.length) html += `<div class="empty-msg">Tidak ada data sejajar</div>`;
  sData.forEach(d => {
    html += `<div class="data-row" onclick="flyToSejajar(${d._i})">
      <div class="row-info">
        <div class="row-noid">ID ${d.no_id} · NO ${d.no}</div>
        <div class="row-stasiun">${d.stasiun}</div>
        <div class="row-coord">Awal: ${d.lat1}, ${d.lon1}</div>
        <div class="row-coord">Akhir: ${d.lat2}, ${d.lon2}</div>
      </div>
    </div>`;
  });
  html += `</div>`;
  listDiv.innerHTML = html;
}

// ── FLY TO ──
function flyToCrossing(i) {
  const d = CROSSING_DATA[i];
  if (!activeWilayah[d.wilayah]) toggleWilayah(d.wilayah);
  if (!showCrossing) toggleType('crossing');
  map.setView([d.lat, d.lon], 16, {animate:true});
  const marker = crossingItems[d.wilayah].find(m => m._cIdx===i);
  if (marker) setTimeout(() => crossingClusters[d.wilayah].zoomToShowLayer(marker, ()=>marker.openPopup()), 400);
}
function flyToSejajar(i) {
  const d = SEJAJAR_DATA[i];
  if (!activeWilayah[d.wilayah]) toggleWilayah(d.wilayah);
  if (!showSejajar) toggleType('sejajar');
  const midLat=(d.lat1+d.lat2)/2, midLon=(d.lon1+d.lon2)/2;
  map.setView([midLat, midLon], 16, {animate:true});
  const item = sejajarItems[d.wilayah].find(x=>x.mid._sIdx===i);
  if (item) setTimeout(()=>item.mid.openPopup(), 500);
}

function toggleSection(id, arrId) {
  const el  = document.getElementById(id);
  const arr = document.getElementById(arrId);
  const hidden = el.style.display==='none';
  el.style.display  = hidden ? '' : 'none';
  if (arr) arr.textContent = hidden ? '▼' : '▶';
}

// ── SIDEBAR ──
function toggleSidebar() {
  const sb=document.getElementById('sidebar'), tb=document.getElementById('sidebar-toggle');
  const isOpen=sb.classList.contains('open');
  sb.classList.toggle('open'); tb.classList.toggle('open');
  tb.textContent = isOpen ? '☰' : '✕';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  const tb=document.getElementById('sidebar-toggle');
  tb.classList.remove('open'); tb.textContent='☰';
}

// ── TOGGLE TYPE ──
function toggleType(tipe) {
  if (tipe==='crossing') {
    showCrossing=!showCrossing;
    const btn=document.getElementById('type-crossing');
    btn.classList.toggle('active',showCrossing); btn.classList.toggle('inactive',!showCrossing);
    wilayahList.forEach(w=>{ if(!activeWilayah[w])return; showCrossing?map.addLayer(crossingClusters[w]):map.removeLayer(crossingClusters[w]); });
  } else {
    showSejajar=!showSejajar;
    const btn=document.getElementById('type-sejajar');
    btn.classList.toggle('active',showSejajar); btn.classList.toggle('inactive',!showSejajar);
    wilayahList.forEach(w=>{ if(!activeWilayah[w])return; showSejajar?map.addLayer(sejajarGroups[w]):map.removeLayer(sejajarGroups[w]); });
  }
  updateCount();
}

// ── TOGGLE WILAYAH ──
function toggleWilayah(w) {
  activeWilayah[w]=!activeWilayah[w];
  const btn=document.getElementById('fb-'+w.replace(/ /g,'_')), color=getColor(w);
  if (activeWilayah[w]) {
    btn.classList.remove('inactive'); btn.classList.add('active');
    btn.style.cssText=`border-color:${color};background:${color};color:white`;
    if(showCrossing) map.addLayer(crossingClusters[w]);
    if(showSejajar)  map.addLayer(sejajarGroups[w]);
  } else {
    btn.classList.remove('active'); btn.classList.add('inactive');
    btn.style.cssText=`border-color:${color};background:white;color:${color}`;
    map.removeLayer(crossingClusters[w]); map.removeLayer(sejajarGroups[w]);
  }
  updateCount();
}

// ── TOGGLE ALL ──
function toggleAll() {
  const allOn=wilayahList.every(w=>activeWilayah[w]);
  wilayahList.forEach(w=>{
    activeWilayah[w]=!allOn;
    const btn=document.getElementById('fb-'+w.replace(/ /g,'_')), color=getColor(w);
    if(!allOn){
      btn.classList.remove('inactive'); btn.classList.add('active');
      btn.style.cssText=`border-color:${color};background:${color};color:white`;
      if(showCrossing) map.addLayer(crossingClusters[w]);
      if(showSejajar)  map.addLayer(sejajarGroups[w]);
    } else {
      btn.classList.remove('active'); btn.classList.add('inactive');
      btn.style.cssText=`border-color:${color};background:white;color:${color}`;
      map.removeLayer(crossingClusters[w]); map.removeLayer(sejajarGroups[w]);
    }
  });
  document.getElementById('btn-all').textContent=allOn?'Semua ON':'Semua OFF';
  updateCount();
}

// ── COUNT ──
function updateCount() {
  let c=0,s=0;
  wilayahList.forEach(w=>{
    if(!activeWilayah[w])return;
    if(showCrossing) c+=(crossingItems[w]||[]).length;
    if(showSejajar)  s+=(sejajarItems[w]||[]).length;
  });
  const parts=[];
  if(showCrossing) parts.push(c+' crossing');
  if(showSejajar)  parts.push(s+' sejajar');
  document.getElementById('count-badge').textContent=parts.join(' · ');
}

// ── SEARCH ──
let _sl=null,_st;
function doSearch(q) {
  clearTimeout(_st);
  _st=setTimeout(()=>{
    q=q.trim().toLowerCase();
    if(!q){
      if(_sl){map.removeLayer(_sl);_sl=null;}
      wilayahList.forEach(w=>{
        if(!activeWilayah[w])return;
        if(showCrossing) map.addLayer(crossingClusters[w]);
        if(showSejajar)  map.addLayer(sejajarGroups[w]);
      });
      updateCount(); return;
    }
    wilayahList.forEach(w=>{map.removeLayer(crossingClusters[w]);map.removeLayer(sejajarGroups[w]);});
    if(_sl){map.removeLayer(_sl);_sl=null;}
    const matched=[];
    if(showCrossing) wilayahList.filter(w=>activeWilayah[w]).forEach(w=>
      crossingItems[w].forEach(m=>{ if(m._popup._content.toLowerCase().includes(q)) matched.push(m); })
    );
    if(showSejajar) wilayahList.filter(w=>activeWilayah[w]).forEach(w=>
      sejajarItems[w].forEach(item=>{ if(item.mid._popup._content.toLowerCase().includes(q)) matched.push(item.mid); })
    );
    _sl=L.layerGroup(matched).addTo(map);
    document.getElementById('count-badge').textContent=matched.length+' hasil pencarian';
    if(matched.length===1){
      const lyr=matched[0];
      if(lyr.getLatLng){map.setView(lyr.getLatLng(),15);lyr.openPopup();}
    } else if(matched.length>1){
      map.fitBounds(L.featureGroup(matched).getBounds().pad(0.1));
    }
  },300);
}

// ── INIT ──
loadData();
</script>
